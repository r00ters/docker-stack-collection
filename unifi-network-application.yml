services:
  unifi-network-application:
    image: lscr.io/linuxserver/unifi-network-application:latest
    container_name: unifi-network-application
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      MONGO_USER: unifi
      MONGO_PASS: CHANGE_ME-CHANGE_ME
      MONGO_HOST: unifi-db
      MONGO_PORT: 27017
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
      MEM_LIMIT: 2048
      MEM_STARTUP: 1024
    volumes:
      - unifi-config:/config
    ports:
      - 8443:8443
      - 3478:3478/udp
      - 10001:10001/udp
      - 8080:8080
      - 1900:1900/udp
      - 8843:8843
      - 8880:8880
      - 6789:6789
      - 5514:5514/udp
    depends_on:
      - unifi-db
    restart: unless-stopped

  unifi-db:
    image: mongo:7-jammy
    container_name: unifi-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: CHANGE_ME-CHANGE_ME
    volumes:
      - unifi-data:/data/db
    configs:
      - source: init-mongo-js
        target: /docker-entrypoint-initdb.d/init-mongo.js
        mode: 0444
    restart: unless-stopped

configs:
  init-mongo-js:
    content: |
      db = db.getSiblingDB('admin');
      db.auth('root', 'CHANGE_ME-CHANGE_ME');
      db.createUser({
        user: 'unifi',
        pwd: 'CHANGE_ME-CHANGE_ME',
        roles: [
          { db: 'unifi', role: 'dbOwner' },
          { db: 'unifi_stat', role: 'dbOwner' },
          { db: 'unifi_audit', role: 'dbOwner' }
        ]
      });

volumes:
  unifi-config:
  unifi-data:
